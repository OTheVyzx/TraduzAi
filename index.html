<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/assets/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TraduzAi</title>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #0b0b10;
      }

      body {
        overflow: hidden;
      }

      #root {
        min-height: 100vh;
        background:
          radial-gradient(circle at 18% 8%, rgba(124, 92, 255, 0.24), transparent 28rem),
          radial-gradient(circle at 86% 20%, rgba(0, 212, 255, 0.15), transparent 34rem),
          linear-gradient(180deg, #0b0b10 0%, #0f0f14 54%, #0b0b10 100%);
      }

      .html-boot-shell {
        min-height: 100vh;
        display: grid;
        grid-template-columns: 256px minmax(0, 1fr);
        color: #f2f2f7;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .html-boot-shell__sidebar {
        display: flex;
        flex-direction: column;
        gap: 20px;
        padding: 22px 18px;
        border-right: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(4, 4, 8, 0.56);
      }

      .html-boot-shell__brand {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .html-boot-shell__mark {
        display: grid;
        width: 36px;
        height: 36px;
        place-items: center;
        border-radius: 10px;
        background: linear-gradient(135deg, #ff5d80, #7c5cff 58%, #00d4ff);
        color: white;
        font-size: 15px;
        font-weight: 800;
        box-shadow: 0 10px 34px rgba(124, 92, 255, 0.28);
      }

      .html-boot-shell__title {
        margin: 0;
        font-size: 14px;
        font-weight: 700;
        line-height: 1.2;
      }

      .html-boot-shell__subtitle {
        margin: 3px 0 0;
        color: rgba(255, 255, 255, 0.46);
        font-size: 11px;
      }

      .html-boot-shell__nav-label {
        margin: 12px 10px 2px;
        color: rgba(255, 255, 255, 0.34);
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .html-boot-shell__nav-item {
        display: flex;
        align-items: center;
        height: 36px;
        padding: 0 12px;
        border-radius: 10px;
        color: rgba(255, 255, 255, 0.72);
        background: rgba(255, 255, 255, 0.04);
        font-size: 13px;
      }

      .html-boot-shell__status {
        margin-top: auto;
        display: grid;
        gap: 8px;
        padding: 12px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.03);
        color: rgba(255, 255, 255, 0.54);
        font-size: 11px;
      }

      .html-boot-shell__main {
        display: flex;
        align-items: center;
        padding: 40px;
      }

      .html-boot-shell__content {
        width: min(680px, 100%);
      }

      .html-boot-shell__eyebrow {
        width: fit-content;
        margin: 0 0 14px;
        padding: 5px 10px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        color: #ff9bad;
        background: rgba(255, 93, 128, 0.1);
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .html-boot-shell__headline {
        margin: 0;
        color: #ffffff;
        font-size: clamp(32px, 6vw, 54px);
        font-weight: 700;
        line-height: 1.04;
      }

      .html-boot-shell__message {
        max-width: 520px;
        margin: 14px 0 0;
        color: rgba(255, 255, 255, 0.64);
        font-size: 15px;
        line-height: 1.6;
      }

      .html-boot-shell__bar {
        width: min(360px, 100%);
        height: 4px;
        margin-top: 28px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
      }

      .html-boot-shell__bar::before {
        content: "";
        display: block;
        width: 42%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #ff5d80, #7c5cff, #00d4ff);
        animation: html-boot-slide 1.1s ease-in-out infinite alternate;
      }

      @media (max-width: 760px) {
        .html-boot-shell {
          grid-template-columns: 1fr;
        }

        .html-boot-shell__sidebar {
          min-height: 96px;
          border-right: 0;
          border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .html-boot-shell__nav-label,
        .html-boot-shell__nav-item,
        .html-boot-shell__status {
          display: none;
        }

        .html-boot-shell__main {
          align-items: flex-start;
          padding: 32px 24px;
        }
      }

      @keyframes html-boot-slide {
        from {
          transform: translateX(-18%);
        }

        to {
          transform: translateX(156%);
        }
      }
    </style>
  </head>
  <body class="bg-bg-primary text-text-primary">
    <div id="root">
      <div class="html-boot-shell" data-html-boot-shell aria-label="TraduzAi iniciando">
        <aside class="html-boot-shell__sidebar">
          <div class="html-boot-shell__brand">
            <div class="html-boot-shell__mark">T</div>
            <div>
              <h1 class="html-boot-shell__title">TraduzAi</h1>
              <p class="html-boot-shell__subtitle">Tradução automática</p>
            </div>
          </div>
          <p class="html-boot-shell__nav-label">Navegação</p>
          <div class="html-boot-shell__nav-item">Início</div>
          <div class="html-boot-shell__status">
            <span>Créditos locais</span>
            <span>Engine em segundo plano</span>
          </div>
        </aside>
        <main class="html-boot-shell__main">
          <div class="html-boot-shell__content">
            <div class="html-boot-shell__eyebrow">Interface pronta</div>
            <h2 class="html-boot-shell__headline">TraduzAi</h2>
            <p class="html-boot-shell__message">
              A janela já está disponível. Recursos pesados como modelos, OCR,
              fontes e pipeline continuam inicializando sem bloquear a interface.
            </p>
            <div class="html-boot-shell__bar"></div>
          </div>
        </main>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
