<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/assets/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TraduzAi</title>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #0b0b10;
      }

      body {
        overflow: hidden;
      }

      #root {
        min-height: 100vh;
        background:
          radial-gradient(circle at 18% 8%, rgba(124, 92, 255, 0.24), transparent 28rem),
          radial-gradient(circle at 86% 20%, rgba(0, 212, 255, 0.15), transparent 34rem),
          linear-gradient(180deg, #0b0b10 0%, #0f0f14 54%, #0b0b10 100%);
      }

      .html-boot {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #f2f2f7;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .html-boot__panel {
        width: min(420px, calc(100vw - 40px));
        padding: 34px 32px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 16px;
        background: rgba(0, 0, 0, 0.36);
        box-shadow: 0 24px 90px rgba(0, 0, 0, 0.42);
      }

      .html-boot__eyebrow {
        width: fit-content;
        margin: 0 auto;
        padding: 5px 10px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        color: rgba(255, 255, 255, 0.48);
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.24em;
        text-transform: uppercase;
      }

      .html-boot__title {
        margin: 18px 0 8px;
        color: #ff5d80;
        font-size: 40px;
        font-weight: 700;
        line-height: 1;
        text-align: center;
      }

      .html-boot__message {
        margin: 0;
        color: rgba(255, 255, 255, 0.86);
        font-size: 18px;
        text-align: center;
      }

      .html-boot__bar {
        height: 3px;
        margin-top: 28px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
      }

      .html-boot__bar::before {
        content: "";
        display: block;
        width: 42%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #ff5d80, #7c5cff, #00d4ff);
        animation: html-boot-slide 1.1s ease-in-out infinite alternate;
      }

      @keyframes html-boot-slide {
        from {
          transform: translateX(-18%);
        }

        to {
          transform: translateX(156%);
        }
      }
    </style>
  </head>
  <body class="bg-bg-primary text-text-primary">
    <div id="root">
      <div class="html-boot" aria-label="TraduzAi carregando">
        <div class="html-boot__panel">
          <div class="html-boot__eyebrow">Boot</div>
          <h1 class="html-boot__title">TraduzAi</h1>
          <p class="html-boot__message">Carregando interface...</p>
          <div class="html-boot__bar"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
